name: Release Browser Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read extension version
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version ($TAG_VERSION) does not match manifest version (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Build extension zip
        run: |
          ZIP_NAME="endfield-google-bridge-v${{ steps.version.outputs.version }}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json \
            popup.html \
            popup.js \
            content-script.js \
            service-worker.js \
            README.md \
            icon.png \
            icon-128.png
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: ${{ env.ZIP_NAME }}

      - name: Create GitHub Release and upload zip
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
